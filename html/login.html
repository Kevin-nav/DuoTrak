<!DOCTYPE html>
<html>
<head>
    <title>Login - DuoTrak</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&family=Plus+Jakarta+Sans%3Awght%40400%3B500%3B700%3B800"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Animations & Custom Styles -->
    <style>
      @keyframes shake {
        10%, 90% { transform: translateX(-1px); }
        20%, 80% { transform: translateX(2px); }
        30%, 50%, 70% { transform: translateX(-4px); }
        40%, 60% { transform: translateX(4px); }
      }
      .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
      
      .form-error { border: 1px solid #ef4444; }
      .error-message { color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem; display: none; }
    </style>
</head>
<body class="bg-white" style='font-family: "Plus Jakarta Sans", "Noto Sans", sans-serif;'>
    <div class="flex min-h-screen flex-col">
        <main class="flex-grow grid grid-cols-1 md:grid-cols-2">
            
            <!-- Left Column: Branding & Image (Banner on mobile, full-height on desktop) -->
            <div class="relative flex h-64 flex-col items-center justify-center bg-gray-900 md:h-full">
                <div
                  class="absolute inset-0 bg-center bg-no-repeat bg-cover"
                  style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCm1fRX1b8YTg1QlbHnTb4zZad-5dx-bqQSJdVZe1WmkqQw9sKnA_rH-9USkizLeTH2iu5yQS3idkW3rqX-TyhBD6qtyGuJjcW3gA3QQHpAspRAT6ddKnkqrsqVfQfA7uYy6cU5y2CmrXiZjhqrTMPfHysA6-07aaCQI-iEoU9kSB3q8c2ndhUIJS1McTO-0o7h4cmo9wmRFbqFFOB7fxZc7i7GrJQjEGt-XhZS0wK3L_ezJNnXA6PCyVfRsUkZkfxvuTQBzkS9Q2I"); opacity: 0.5;'
                ></div>
                <div class="relative z-10 text-center text-white px-8 md:px-12">
                    <h1 class="text-3xl font-bold tracking-tight md:text-4xl">Welcome Back</h1>
                    <p class="mt-4 text-base text-gray-200 md:text-lg">Track your habits, support your partner, and achieve your goals together.</p>
                </div>
            </div>

            <!-- Right Column: Form -->
            <div class="flex flex-col items-center justify-center p-6 sm:p-12">
                <div class="w-full max-w-md animate-fade-in">
                    <h2 class="text-[#111518] tracking-light text-[28px] font-bold leading-tight text-center">Log In to DuoTrak</h2>
                    <p class="text-[#637c88] text-base font-normal leading-normal mt-2 pb-8 text-center">
                        Let's continue your journey.
                    </p>

                    <form id="login-form" class="flex flex-col gap-4">
                        <div>
                            <label for="email" class="sr-only">Email</label>
                            <input id="email" type="email" placeholder="Email" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-2 focus:ring-[#19a1e5]/50 border border-transparent bg-[#f0f3f4] h-14 placeholder:text-[#637c88] p-4 text-base font-normal leading-normal transition-all duration-200"/>
                            <p id="email-error" class="error-message">Please enter a valid email.</p>
                        </div>

                        <div class="relative">
                            <label for="password" class="sr-only">Password</label>
                            <input id="password" type="password" placeholder="Password" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-2 focus:ring-[#19a1e5]/50 border border-transparent bg-[#f0f3f4] h-14 placeholder:text-[#637c88] p-4 pr-12 text-base font-normal leading-normal transition-all duration-200"/>
                            <div id="password-toggle" class="absolute inset-y-0 right-0 flex cursor-pointer items-center pr-4 text-[#637c88] hover:text-[#111518]">
                                <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                                    <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                                </svg>
                                <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="hidden" viewBox="0 0 16 16">
                                    <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7.029 7.029 0 0 0 2.79-.588zM5.21 3.088A7.028 7.028 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474L5.21 3.089z"/>
                                    <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829l-2.83-2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12-.708.708z"/>
                                </svg>
                            </div>
                        </div>
                        <p id="password-error" class="error-message -mt-3">Invalid email or password.</p>

                        <p class="text-[#637c88] text-sm font-normal text-center underline cursor-pointer hover:text-[#111518]">Forgot Password?</p>

                        <div class="flex flex-col gap-3 pt-4">
                            <button type="submit" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 bg-[#19a1e5] text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-[#1590d3] transition-all duration-200 active:scale-95">Log In</button>
                            <button type="button" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 bg-[#f0f3f4] text-[#111518] gap-2 text-base font-bold leading-normal tracking-[0.015em] hover:bg-[#dce2e5] transition-all duration-200 active:scale-95">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a96,96,0,1,1-21.95-61.09,8,8,0,1,1-12.33,10.18A80,80,0,1,0,207.6,136H128a8,8,0,0,1,0-16h88A8,8,0,0,1,224,128Z"></path></svg>
                                <span>Or continue with Google</span>
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center pt-8">
                        <p class="text-sm text-[#637c88]">Don't have an account? <a href="signup.html" class="font-bold text-[#19a1e5] hover:underline">Sign up</a></p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="bg-white p-6 md:px-12">
            <div class="flex flex-col items-center justify-between gap-4 text-center sm:flex-row">
                <p class="text-sm text-[#637c88]">© <span id="copyright-year"></span> DuoTrak Inc. All Rights Reserved.</p>
                <a href="mailto:info@duotrak.org" class="text-sm font-medium text-[#111518] hover:text-[#19a1e5] hover:underline">info@duotrak.org</a>
            </div>
        </footer>
    </div>

    <script>
        // Same JS as before, with added footer script
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('copyright-year').textContent = new Date().getFullYear();

            const MOCK_USER = { email: 'chris@duotrak.com', password: 'password123' };
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const passwordError = document.getElementById('password-error');
            const passwordToggle = document.getElementById('password-toggle');
            const eyeOpen = document.getElementById('eye-open');
            const eyeClosed = document.getElementById('eye-closed');

            passwordToggle.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                eyeOpen.classList.toggle('hidden', isPassword);
                eyeClosed.classList.toggle('hidden', !isPassword);
            });
            
            form.addEventListener('submit', (event) => {
                event.preventDefault();
                passwordInput.classList.remove('form-error', 'animate-shake');
                passwordError.style.display = 'none';

                if (emailInput.value === MOCK_USER.email && passwordInput.value === MOCK_USER.password) {
                    alert('Login successful! (Redirecting...)');
                } else {
                    passwordInput.classList.add('form-error', 'animate-shake');
                    passwordError.style.display = 'block';
                    setTimeout(() => passwordInput.classList.remove('animate-shake'), 500);
                }
            });
        });
    </script>
</body>
</html>
