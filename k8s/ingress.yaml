# NOTE: Production traffic should use Cloudflare Tunnel manifests instead of this ingress.
# Keep this file only as an optional fallback for non-tunnel environments.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: duotrak-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod" # Uncomment if using cert-manager
spec:
  rules:
    - host: duotrak.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: duotrak-frontend
                port:
                  number: 80
  # tls: # Uncomment for HTTPS
  #   - hosts:
  #       - duotrak.org
  #     secretName: duotrak-tls
