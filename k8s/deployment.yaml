apiVersion: apps/v1
kind: Deployment
metadata:
  name: duotrak-frontend
  namespace: default
  labels:
    app: duotrak-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: duotrak-frontend
  template:
    metadata:
      labels:
        app: duotrak-frontend
    spec:
      containers:
        - name: duotrak-frontend
          image: ghcr.io/kevinnchorbuno/duotrak-frontend:latest # Update with your actual image path
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.duotrak.com" # Update this
            - name: FASTAPI_URL
              value: "http://duotrak-backend:8000" # Internal Cluster URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: duotrak-secrets
                  key: secret-key
            - name: FIREBASE_SERVICE_ACCOUNT_JSON_PATH
              value: "/etc/secrets/firebase-adminsdk.json"
          volumeMounts:
            - name: firebase-secret-vol
              mountPath: "/etc/secrets"
              readOnly: true
      volumes:
        - name: firebase-secret-vol
          secret:
            secretName: duotrak-firebase-key # You must create this secret in K8s
            items:
              - key: firebase-adminsdk.json
                path: firebase-adminsdk.json
