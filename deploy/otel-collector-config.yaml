receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  # Metric names required by cutover readiness gate:
  # - schema_validation_success
  # - question_endpoint_p95_seconds
  # - plan_endpoint_p95_seconds
  # - session_not_found_rate
  metricstransform:
    transforms:
      - include: schema_validation_success
        action: update
      - include: question_endpoint_p95_seconds
        action: update
      - include: plan_endpoint_p95_seconds
        action: update
      - include: session_not_found_rate
        action: update
  batch:

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: duotrak

  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"

  logging:
    loglevel: debug

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [metricstransform, batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki, logging]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging] # For now just logging traces, can add Jaeger/Tempo if needed
